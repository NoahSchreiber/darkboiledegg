<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Boiled Egg</title>
    <style>
      * { margin: 0; padding: 0; }
      body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
      img { max-width: 100%; max-height: 100vh; }
      #audio-gate {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        border: 1px solid #fff;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 10px 14px;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        z-index: 10;
      }
      #bg-player {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RJMNZ6M9NZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RJMNZ6M9NZ');
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      var bgPlayer;

      function onYouTubeIframeAPIReady() {
        bgPlayer = new YT.Player('bg-player', {
          videoId: 'C7EGMBS6nXI',
          playerVars: {
            autoplay: 1,
            controls: 0,
            disablekb: 1,
            fs: 0,
            loop: 1,
            modestbranding: 1,
            playsinline: 1,
            playlist: 'C7EGMBS6nXI',
            rel: 0
          },
          events: {
            onReady: function (event) {
              event.target.mute();
              event.target.playVideo();
            }
          }
        });
      }

      function enableSound() {
        if (bgPlayer && typeof bgPlayer.unMute === 'function') {
          bgPlayer.unMute();
          bgPlayer.setVolume(100);
          bgPlayer.playVideo();
        }

        var gate = document.getElementById('audio-gate');
        if (gate) {
          gate.style.display = 'none';
        }
      }

      window.addEventListener('DOMContentLoaded', function () {
        var gate = document.getElementById('audio-gate');
        gate.addEventListener('click', enableSound);
        gate.addEventListener('touchstart', function (event) {
          event.preventDefault();
          enableSound();
        }, { passive: false });
      });
    </script>
  </head>
  <body>
    <img src="images/evil_egg.png" alt="egg" />
    <button id="audio-gate" type="button">Tap to enable sound</button>
    <div id="bg-player" aria-hidden="true"></div>
  </body>
</html>
