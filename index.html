<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Boiled Egg</title>
    <style>
      * { margin: 0; padding: 0; }
      body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
      img { max-width: 100%; max-height: 100vh; }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RJMNZ6M9NZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RJMNZ6M9NZ');
    </script>

    <script>
      function enableMusicOnFirstClick() {
        var player = document.getElementById('bg-music');
        if (!player) {
          return;
        }

        var url = new URL(player.src);
        url.searchParams.set('mute', '0');
        player.src = url.toString();
      }

      window.addEventListener('pointerdown', enableMusicOnFirstClick, { once: true });
    </script>
  </head>
  <body>
    <img src="images/evil_egg.png" alt="egg" />
    <iframe
      id="bg-music"
      width="0"
      height="0"
      src="https://www.youtube.com/embed/C7EGMBS6nXI?autoplay=1&mute=1&loop=1&playlist=C7EGMBS6nXI&controls=0&modestbranding=1&rel=0"
      title="Background music"
      frameborder="0"
      allow="autoplay; encrypted-media"
      referrerpolicy="strict-origin-when-cross-origin"
      style="position: absolute; width: 0; height: 0; border: 0; opacity: 0; pointer-events: none;"
    ></iframe>
  </body>
</html>
