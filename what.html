<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>what</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23071118'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%238cd2ff'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg-a: #08111a;
        --bg-b: #162537;
        --text: #edf6ff;
        --muted: rgba(237, 246, 255, 0.72);
        --panel: rgba(8, 14, 22, 0.78);
        --line: rgba(134, 185, 242, 0.32);
        --accent: #8cd2ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(89, 163, 255, 0.14), transparent 36%),
          linear-gradient(180deg, var(--bg-b), var(--bg-a) 58%, #04080c 100%);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        user-select: none;
      }

      a {
        color: var(--accent);
      }

      .site-nav {
        position: fixed;
        top: 14px;
        left: 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(8, 14, 22, 0.82);
        backdrop-filter: blur(10px);
        z-index: 7;
      }

      .site-nav a {
        color: var(--text);
        text-decoration: none;
        font-size: 13px;
        opacity: 0.72;
        transition: opacity 0.15s ease;
      }

      .site-nav a:hover {
        opacity: 1;
        text-decoration: underline;
      }

      .site-nav a.active {
        opacity: 1;
        color: var(--accent);
        text-decoration: underline;
        pointer-events: none;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      [hidden] {
        display: none !important;
      }

      #app-shell {
        position: fixed;
        inset: 0;
      }

      #viewport {
        width: 100%;
        height: 100%;
      }

      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        border: 0;
        background: linear-gradient(180deg, rgba(4, 8, 12, 0.45), rgba(4, 8, 12, 0.82));
        backdrop-filter: blur(3px);
        color: inherit;
        cursor: pointer;
        z-index: 5;
      }

      #overlay-card {
        width: min(92vw, 540px);
        border: 1px solid var(--line);
        background:
          linear-gradient(145deg, rgba(23, 35, 50, 0.92), rgba(8, 14, 22, 0.88));
        padding: 24px;
        border-radius: 18px;
        box-shadow: 0 24px 54px rgba(0, 0, 0, 0.45);
        text-align: left;
      }

      #overlay-card h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1;
        letter-spacing: 0.04em;
      }

      #overlay-card p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      #overlay-card strong {
        color: var(--accent);
      }

      #hud {
        position: fixed;
        top: 14px;
        right: 14px;
        min-width: min(280px, calc(100vw - 28px));
        max-width: min(340px, calc(100vw - 28px));
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.45;
        z-index: 4;
        backdrop-filter: blur(10px);
      }

      #hud strong {
        color: var(--accent);
      }

      #hud-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 10px;
      }

      #reticle {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 3;
      }

      #reticle::before,
      #reticle::after {
        content: "";
        position: absolute;
        background: rgba(237, 246, 255, 0.92);
      }

      #reticle::before {
        top: 0;
        left: 7px;
        width: 2px;
        height: 16px;
      }

      #reticle::after {
        top: 7px;
        left: 0;
        width: 16px;
        height: 2px;
      }

    </style>
  </head>
  <body>
    <div id="app-shell">
      <nav class="site-nav" aria-label="Site">
        <a href="index.html">egg</a>
        <a href="eggening.html">eggening</a>
        <a href="geschichte-zusammenfassung.html">geschichte</a>
        <a class="active" href="what.html">what</a>
      </nav>

      <div id="viewport"></div>

      <button id="overlay" type="button" aria-label="Start 3D view">
        <div id="overlay-card">
          <h1>what</h1>
          <p>
            Click to start. <strong>W A S D</strong> move,
            <strong>Space</strong> up, <strong>Shift</strong> down,
            <strong>Mouse</strong> look, <strong>Esc</strong> unlock.
          </p>
        </div>
      </button>

      <div id="hud">
        <div id="hud-grid">
          <strong>State</strong>
          <span id="lock-state">ready</span>
          <strong>Position</strong>
          <span id="position-readout">0.00, 1.75, 6.00</span>
          <strong>Controls</strong>
          <span>WASD move | Space up | Shift down | Esc unlock</span>
        </div>
      </div>

      <div id="reticle"></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";

      const viewport = document.getElementById("viewport");
      const overlay = document.getElementById("overlay");
      const lockState = document.getElementById("lock-state");
      const positionReadout = document.getElementById("position-readout");

      const MOVE_CODES = new Set([
        "KeyW",
        "KeyA",
        "KeyS",
        "KeyD",
        "Space",
        "ShiftLeft",
        "ShiftRight",
      ]);

      const WORLD_UP = new THREE.Vector3(0, 1, 0);
      const forwardVector = new THREE.Vector3();
      const rightVector = new THREE.Vector3();
      const moveVector = new THREE.Vector3();

      const state = {
        isLocked: false,
        elapsed: 0,
        lookSensitivity: 0.0019,
        moveSpeed: 7.5,
        verticalSpeed: 5.5,
        keys: Object.create(null),
      };

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x071018);
      scene.fog = new THREE.FogExp2(0x071018, 0.025);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      viewport.appendChild(renderer.domElement);

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const yawRig = new THREE.Object3D();
      const pitchRig = new THREE.Object3D();
      yawRig.position.set(0, 1.75, 6);
      yawRig.add(pitchRig);
      pitchRig.add(camera);
      scene.add(yawRig);

      const hemi = new THREE.HemisphereLight(0xa7d5ff, 0x091018, 0.75);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.85);
      dir.position.set(3, 6, 2);
      scene.add(dir);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(220, 220),
        new THREE.MeshStandardMaterial({
          color: 0x0b141d,
          roughness: 0.96,
          metalness: 0.04,
        })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.5;
      scene.add(floor);

      const grid = new THREE.GridHelper(220, 120, 0x4472a1, 0x173044);
      grid.position.y = -0.49;
      scene.add(grid);

      function createDemoShaderMaterial() {
        return new THREE.ShaderMaterial({
          uniforms: {
            uTime: { value: 0 },
          },
          vertexShader: `
            varying vec3 vWorldPos;
            varying vec3 vNormal;

            void main() {
              vec4 worldPos = modelMatrix * vec4(position, 1.0);
              vWorldPos = worldPos.xyz;
              vNormal = normalize(mat3(modelMatrix) * normal);
              gl_Position = projectionMatrix * viewMatrix * worldPos;
            }
          `,
          fragmentShader: `
            precision highp float;

            uniform float uTime;
            varying vec3 vWorldPos;
            varying vec3 vNormal;

            void main() {
              vec3 normal = normalize(vNormal);
              vec3 lightDir = normalize(vec3(0.4, 0.8, 0.25));
              float diffuse = max(dot(normal, lightDir), 0.0);

              float rings = sin(length(vWorldPos.xz) * 6.0 - uTime * 2.2) * 0.5 + 0.5;
              float bands = sin(vWorldPos.y * 3.8 + uTime * 1.4) * 0.5 + 0.5;
              vec3 colorA = vec3(0.10, 0.64, 0.95);
              vec3 colorB = vec3(0.95, 0.38, 0.22);
              vec3 color = mix(colorA, colorB, rings * 0.65 + bands * 0.35);

              gl_FragColor = vec4(color * (0.22 + diffuse * 0.78), 1.0);
            }
          `,
        });
      }

      function createDemoStage(targetScene) {
        const group = new THREE.Group();
        targetScene.add(group);

        const shaderMaterial = createDemoShaderMaterial();

        const hero = new THREE.Mesh(
          new THREE.TorusKnotGeometry(1.05, 0.32, 180, 28),
          shaderMaterial
        );
        hero.position.set(0, 1.75, 0);
        group.add(hero);

        const plinth = new THREE.Mesh(
          new THREE.CylinderGeometry(1.8, 2.15, 0.9, 32),
          new THREE.MeshStandardMaterial({ color: 0x13212e, roughness: 0.84 })
        );
        plinth.position.set(0, 0.0, 0);
        group.add(plinth);

        for (let index = 0; index < 14; index += 1) {
          const angle = (index / 14) * Math.PI * 2;
          const marker = new THREE.Mesh(
            new THREE.BoxGeometry(0.7, 2.8, 0.7),
            new THREE.MeshStandardMaterial({
              color: index % 2 === 0 ? 0x1c3448 : 0x152635,
              roughness: 0.72,
              metalness: 0.08,
            })
          );
          marker.position.set(Math.cos(angle) * 9, 0.9, Math.sin(angle) * 9);
          marker.rotation.y = angle;
          group.add(marker);
        }

        return {
          shaderMaterial,
          hero,
          update(elapsed, delta) {
            shaderMaterial.uniforms.uTime.value = elapsed;
            hero.rotation.x += delta * 0.22;
            hero.rotation.y += delta * 0.58;
          },
        };
      }

      const stage = createDemoStage(scene);

      function setKeyState(code, isDown) {
        if (MOVE_CODES.has(code)) {
          state.keys[code] = isDown;
        }
      }

      function resetKeys() {
        for (const code of MOVE_CODES) {
          state.keys[code] = false;
        }
      }

      function updateLockUi() {
        overlay.hidden = state.isLocked;
        lockState.textContent = state.isLocked ? "locked" : "click overlay to enter";
      }

      function updatePositionReadout() {
        positionReadout.textContent = [
          yawRig.position.x.toFixed(2),
          yawRig.position.y.toFixed(2),
          yawRig.position.z.toFixed(2),
        ].join(", ");
      }

      function requestPointerLock() {
        renderer.domElement.requestPointerLock();
      }

      overlay.addEventListener("click", requestPointerLock);
      overlay.addEventListener("keydown", (event) => {
        if (event.code === "Enter" || event.code === "Space") {
          event.preventDefault();
          requestPointerLock();
        }
      });

      document.addEventListener("pointerlockchange", () => {
        state.isLocked = document.pointerLockElement === renderer.domElement;
        if (!state.isLocked) {
          resetKeys();
        }
        updateLockUi();
      });

      document.addEventListener("pointerlockerror", () => {
        state.isLocked = false;
        resetKeys();
        updateLockUi();
      });

      document.addEventListener("mousemove", (event) => {
        if (!state.isLocked) {
          return;
        }

        yawRig.rotation.y -= event.movementX * state.lookSensitivity;
        pitchRig.rotation.x -= event.movementY * state.lookSensitivity;
        pitchRig.rotation.x = THREE.MathUtils.clamp(pitchRig.rotation.x, -1.45, 1.45);
      });

      document.addEventListener("keydown", (event) => {
        if (!state.isLocked || !MOVE_CODES.has(event.code)) {
          return;
        }

        event.preventDefault();
        setKeyState(event.code, true);
      });

      document.addEventListener("keyup", (event) => {
        if (!MOVE_CODES.has(event.code)) {
          return;
        }

        event.preventDefault();
        setKeyState(event.code, false);
      });

      window.addEventListener("blur", resetKeys);

      function movePlayer(delta, activeKeys = state.keys) {
        const forward = (activeKeys.KeyW ? 1 : 0) - (activeKeys.KeyS ? 1 : 0);
        const strafe = (activeKeys.KeyD ? 1 : 0) - (activeKeys.KeyA ? 1 : 0);
        const vertical =
          (activeKeys.Space ? 1 : 0) -
          ((activeKeys.ShiftLeft || activeKeys.ShiftRight) ? 1 : 0);

        moveVector.set(0, 0, 0);

        if (forward !== 0 || strafe !== 0) {
          camera.getWorldDirection(forwardVector);
          forwardVector.y = 0;

          if (forwardVector.lengthSq() === 0) {
            forwardVector.set(0, 0, -1);
          }

          forwardVector.normalize();
          rightVector.crossVectors(forwardVector, WORLD_UP).normalize();

          moveVector.addScaledVector(forwardVector, forward);
          moveVector.addScaledVector(rightVector, strafe);
          moveVector.normalize();
          yawRig.position.addScaledVector(moveVector, state.moveSpeed * delta);
        }

        if (vertical !== 0) {
          yawRig.position.y += vertical * state.verticalSpeed * delta;
        }
      }

      function resizeRenderer() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener("resize", resizeRenderer);

      const clock = new THREE.Clock();

      function frame() {
        const delta = Math.min(clock.getDelta(), 0.05);
        state.elapsed += delta;

        if (state.isLocked) {
          movePlayer(delta);
        }

        stage.update(state.elapsed, delta);
        updatePositionReadout();
        renderer.render(scene, camera);
        requestAnimationFrame(frame);
      }

      window.whatApp = {
        camera,
        renderer,
        scene,
        stage,
        player: yawRig,
        getState() {
          return {
            locked: state.isLocked,
            position: yawRig.position.toArray(),
            yaw: yawRig.rotation.y,
            pitch: pitchRig.rotation.x,
          };
        },
        stepMovement(delta, overrides = {}) {
          movePlayer(delta, { ...state.keys, ...overrides });
          updatePositionReadout();
          return this.getState();
        },
      };

      updateLockUi();
      updatePositionReadout();
      resizeRenderer();
      frame();
    </script>
  </body>
</html>
